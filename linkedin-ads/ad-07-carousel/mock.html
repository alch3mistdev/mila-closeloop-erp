<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 07 — Carousel | LinkedIn Mock</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f4f2ee;font-family:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;justify-content:center;padding:40px 16px;min-height:100vh}
  .feed{width:100%;max-width:552px}
  .label{text-align:center;font-size:11px;color:rgba(0,0,0,.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;font-weight:600}
  .card{background:#fff;border-radius:8px;border:1px solid rgba(0,0,0,.08);overflow:hidden}
  .header{padding:12px 16px 0}
  .header-row{display:flex;align-items:flex-start;gap:8px}
  .avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;overflow:hidden;background:#f7f3ea;border:1px solid #e0d8cc;display:flex;align-items:center;justify-content:center}
  .avatar svg{width:30px;height:30px}
  .meta{flex:1;min-width:0}
  .meta-name{font-size:14px;font-weight:600;color:rgba(0,0,0,.9);line-height:1.3}
  .meta-detail{font-size:12px;color:rgba(0,0,0,.6);line-height:1.3}
  .meta-promoted{font-size:12px;color:rgba(0,0,0,.6);display:flex;align-items:center;gap:4px;line-height:1.3}
  .dots{color:rgba(0,0,0,.6);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1}
  .body{padding:8px 16px 12px;font-size:14px;line-height:1.5;color:rgba(0,0,0,.9)}
  .tag{display:inline-block;background:#f3f0eb;color:rgba(0,0,0,.5);font-size:10px;font-weight:600;letter-spacing:0.5px;padding:3px 8px;border-radius:4px;margin-bottom:8px;text-transform:uppercase}

  /* Carousel */
  .carousel-wrapper{position:relative;border-top:1px solid rgba(0,0,0,.05);border-bottom:1px solid rgba(0,0,0,.05)}
  .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .carousel::-webkit-scrollbar{display:none}
  .carousel-card{flex:0 0 82%;scroll-snap-align:start;margin-right:8px;position:relative}
  .carousel-card:first-child{margin-left:16px}
  .carousel-card:last-child{margin-right:16px}
  .carousel-card img{width:100%;display:block;border-radius:8px;border:1px solid rgba(0,0,0,.08)}
  .carousel-card-footer{padding:8px 12px;background:#f7f5f0;border:1px solid rgba(0,0,0,.08);border-top:none;border-radius:0 0 8px 8px;margin-top:-9px;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between}
  .carousel-card-headline{font-size:14px;font-weight:600;color:rgba(0,0,0,.9)}
  .carousel-card-cta{font-size:12px;font-weight:600;color:#0a66c2;cursor:pointer;white-space:nowrap}
  .carousel-card-cta:hover{text-decoration:underline}

  /* Carousel navigation arrows */
  .carousel-nav{position:absolute;top:50%;transform:translateY(-70%);width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:background .15s}
  .carousel-nav:hover{background:#f3f3f3}
  .carousel-nav.prev{left:8px}
  .carousel-nav.next{right:8px}
  .carousel-nav svg{width:16px;height:16px;fill:rgba(0,0,0,.65)}

  /* Dot indicators */
  .carousel-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 4px}
  .carousel-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.15);transition:background .2s}
  .carousel-dot.active{background:rgba(0,0,0,.6)}

  .separator{height:1px;background:rgba(0,0,0,.08);margin:0 16px}
  .engagement{padding:4px 16px 2px;display:flex;justify-content:space-between}
  .eng-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:12px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:rgba(0,0,0,.6);font-weight:600;transition:background .15s;border:none;background:none;font-family:inherit}
  .eng-btn:hover{background:rgba(0,0,0,.08)}
  .eng-btn svg{width:20px;height:20px;fill:rgba(0,0,0,.55)}
</style>
</head>
<body>
<div class="feed">
  <div class="label">LinkedIn Sponsored Content — Carousel Ad (3 Cards)</div>
  <div class="tag">Ad 07: Peer Proof</div>
  <div class="card">
    <div class="header">
      <div class="header-row">
        <div class="avatar">
          <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="40" height="40" rx="12" fill="#f7f3ea" stroke="#c9b9a5" stroke-width=".8"/><path d="M10 16h8c3.8 0 6.9 3.1 6.9 6.9v.2c0 3.8-3.1 6.9-6.9 6.9H10V16z" fill="#005e66"/><path d="M34 28h-8c-3.8 0-6.9-3.1-6.9-6.9v-.2c0-3.8 3.1-6.9 6.9-6.9H34v14z" fill="#e84e1b"/><circle cx="32.2" cy="22" r="2.4" fill="#f7f3ea"/></svg>
        </div>
        <div class="meta">
          <div class="meta-name">CloseLoop</div>
          <div class="meta-detail">1,234 followers</div>
          <div class="meta-promoted">Promoted &middot; <svg viewBox="0 0 16 16" style="width:12px;height:12px"><circle cx="8" cy="8" r="6.5" fill="none" stroke="rgba(0,0,0,.45)" stroke-width="1"/><ellipse cx="8" cy="8" rx="2.5" ry="6.5" fill="none" stroke="rgba(0,0,0,.45)" stroke-width="1"/><line x1="1.5" y1="8" x2="14.5" y2="8" stroke="rgba(0,0,0,.45)" stroke-width="1"/></svg></div>
        </div>
        <div class="dots">&middot;&middot;&middot;</div>
      </div>
    </div>

    <div class="body">
      Migration validation for organizations managing multi-plant ERP consolidations across heterogeneous source systems.
    </div>

    <!-- Carousel -->
    <div class="carousel-wrapper">
      <div class="carousel" id="carousel">
        <!-- Card 1 -->
        <div class="carousel-card">
          <img src="card-01-problem-1080x1080.svg" alt="Card 1: The Problem">
          <div class="carousel-card-footer">
            <span class="carousel-card-headline">The Problem</span>
            <span class="carousel-card-cta">Learn More</span>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="carousel-card">
          <img src="card-02-solution-1080x1080.svg" alt="Card 2: What We Check">
          <div class="carousel-card-footer">
            <span class="carousel-card-headline">What We Check</span>
            <span class="carousel-card-cta">Learn More</span>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="carousel-card">
          <img src="card-03-result-1080x1080.svg" alt="Card 3: The Result">
          <div class="carousel-card-footer">
            <span class="carousel-card-headline">The Result</span>
            <span class="carousel-card-cta">Learn More</span>
          </div>
        </div>
      </div>

      <!-- Navigation arrows -->
      <div class="carousel-nav prev" onclick="scrollCarousel(-1)">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </div>
      <div class="carousel-nav next" onclick="scrollCarousel(1)">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </div>
    </div>

    <!-- Dot indicators -->
    <div class="carousel-dots">
      <div class="carousel-dot active" id="dot0"></div>
      <div class="carousel-dot" id="dot1"></div>
      <div class="carousel-dot" id="dot2"></div>
    </div>

    <div class="separator"></div>

    <div class="engagement">
      <button class="eng-btn"><svg viewBox="0 0 24 24"><path d="M19.46 11l-3.91-3.91a7 7 0 0 1-1.69-2.74l-.49-1.47A2.76 2.76 0 0 0 10.76 1 2.75 2.75 0 0 0 8 3.74v1.12a9.19 9.19 0 0 0 .46 2.85L8.89 9H4.12A2.12 2.12 0 0 0 2 11.12a2.16 2.16 0 0 0 .92 1.76A2.11 2.11 0 0 0 2 14.62a2.14 2.14 0 0 0 1.28 2 2 2 0 0 0-.28 1 2.12 2.12 0 0 0 2 2.12v0A2.12 2.12 0 0 0 7.12 22h7.49a8.08 8.08 0 0 0 3.58-.84l.31-.16H21V11zM19.5 19.61l-.83.42a6.09 6.09 0 0 1-2.68.47H7.12a.62.62 0 0 1-.62-.62.62.62 0 0 1 .62-.62h2V17.5H5a.62.62 0 0 1-.62-.62.62.62 0 0 1 .62-.63h4.13v-1.75H4.12a.62.62 0 0 1-.62-.62.62.62 0 0 1 .62-.63H9.5v-1.75H4.12a.62.62 0 0 1 0-1.24h6.76L9.45 7.14A7.18 7.18 0 0 1 9 4.86V3.74A1.25 1.25 0 0 1 10.76 2.5a1.27 1.27 0 0 1 1.2.86l.49 1.47a8.48 8.48 0 0 0 2.06 3.34L18.42 12H19.5z"/></svg>Like</button>
      <button class="eng-btn"><svg viewBox="0 0 24 24"><path d="M7 9h10v1H7zm0 4h7v-1H7zm16-2a6.78 6.78 0 0 1-2.84 5.61L12 22v-4H8A7 7 0 0 1 8 4h8a7 7 0 0 1 7 7zm-2 0a5 5 0 0 0-5-5H8a5 5 0 0 0 0 10h5v2.59L17.6 15A4.79 4.79 0 0 0 21 11z"/></svg>Comment</button>
      <button class="eng-btn"><svg viewBox="0 0 24 24"><path d="M13.96 5H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-5.8l-2 1.49V17H6V7h5.96l2-1.51zm7.82-2.23l-3.37 2.52-2.43 1.82A2 2 0 0 0 15.1 8l-.03.04L12 10.35 9.81 12H6v-2h2.59l5.93-4.43 2.02-1.5 3.37-2.53a1 1 0 0 1 1.19 0l.67.5a1 1 0 0 1 .01 1.58z"/></svg>Repost</button>
      <button class="eng-btn"><svg viewBox="0 0 24 24"><path d="M21 3L0 10l7.66 4.26L20 6l-8.26 12.34L16 21z"/></svg>Send</button>
    </div>
  </div>
</div>

<script>
const carousel = document.getElementById('carousel');
const dots = [document.getElementById('dot0'), document.getElementById('dot1'), document.getElementById('dot2')];
let current = 0;

function scrollCarousel(dir) {
  current = Math.max(0, Math.min(2, current + dir));
  const cards = carousel.querySelectorAll('.carousel-card');
  cards[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
  updateDots();
}

function updateDots() {
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
}

carousel.addEventListener('scroll', () => {
  const scrollLeft = carousel.scrollLeft;
  const cardWidth = carousel.querySelector('.carousel-card').offsetWidth + 8;
  const newCurrent = Math.round(scrollLeft / cardWidth);
  if (newCurrent !== current) {
    current = Math.max(0, Math.min(2, newCurrent));
    updateDots();
  }
});
</script>
</body>
</html>
