<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="rounded"><rect width="1200" height="1200" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background: very dark, ominous -->
    <rect width="1200" height="1200" fill="#151311"/>

    <!-- Subtle dark teal vignette -->
    <circle cx="600" cy="350" r="600" fill="#005E66" opacity="0.05"/>

    <!-- Eyebrow -->
    <text x="100" y="120" fill="#655C53" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="22" letter-spacing="4" font-weight="500">MIGRATION DEFECT</text>

    <!-- ID Badge visual element -->
    <g transform="translate(340, 180)">
      <!-- Badge outline: ghosted, slightly tilted -->
      <g transform="rotate(-3, 260, 150)">
        <!-- Badge body -->
        <rect x="0" y="0" width="520" height="300" rx="20" fill="#1e1c1a" stroke="#3a342f" stroke-width="2"/>

        <!-- Badge header bar -->
        <rect x="0" y="0" width="520" height="65" rx="20" fill="#1e1c1a"/>
        <rect x="0" y="40" width="520" height="25" fill="#1e1c1a"/>
        <rect x="0" y="0" width="520" height="65" rx="20" stroke="#3a342f" stroke-width="2" fill="none"/>

        <!-- Company name placeholder -->
        <rect x="30" y="20" width="180" height="14" rx="3" fill="#3a342f" opacity="0.5"/>
        <rect x="30" y="40" width="100" height="10" rx="3" fill="#3a342f" opacity="0.3"/>

        <!-- Photo placeholder -->
        <rect x="30" y="85" width="120" height="150" rx="12" fill="#3a342f" opacity="0.3"/>
        <!-- Silhouette -->
        <circle cx="90" cy="130" r="30" fill="#3a342f" opacity="0.5"/>
        <rect x="55" y="165" width="70" height="50" rx="8" fill="#3a342f" opacity="0.4"/>

        <!-- Info lines -->
        <rect x="180" y="95" width="280" height="14" rx="3" fill="#3a342f" opacity="0.4"/>
        <rect x="180" y="120" width="200" height="14" rx="3" fill="#3a342f" opacity="0.3"/>
        <rect x="180" y="150" width="240" height="14" rx="3" fill="#3a342f" opacity="0.35"/>
        <rect x="180" y="180" width="160" height="14" rx="3" fill="#3a342f" opacity="0.25"/>

        <!-- Badge barcode -->
        <g transform="translate(30, 250)">
          <rect x="0" y="0" width="3" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="6" y="0" width="2" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="11" y="0" width="4" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="18" y="0" width="2" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="23" y="0" width="3" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="29" y="0" width="2" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="34" y="0" width="5" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="42" y="0" width="2" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="47" y="0" width="3" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="53" y="0" width="4" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="60" y="0" width="2" height="25" fill="#3a342f" opacity="0.3"/>
          <rect x="65" y="0" width="3" height="25" fill="#3a342f" opacity="0.3"/>
        </g>
      </g>

      <!-- EXPIRED stamp: bold, red, slightly rotated -->
      <g transform="rotate(-12, 260, 150)">
        <rect x="80" y="95" width="360" height="100" rx="8" fill="none" stroke="#A52323" stroke-width="6" opacity="0.85"/>
        <text x="260" y="163" text-anchor="middle" fill="#A52323" font-family="'IBM Plex Mono', monospace" font-size="64" font-weight="700" letter-spacing="12" opacity="0.85">EXPIRED</text>
      </g>

      <!-- Still active indicator: small green dot pulsing -->
      <circle cx="490" cy="30" r="8" fill="#275928" opacity="0.9"/>
      <circle cx="490" cy="30" r="8" fill="#275928" opacity="0.3"/>
      <text x="468" y="58" fill="#275928" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1" opacity="0.7">ACTIVE</text>
    </g>

    <!-- Headline -->
    <text x="600" y="620" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Iowan Old Style', 'Palatino Linotype', Palatino, serif" font-size="64" font-weight="700">
      <tspan x="600" dy="0">A Dead Employee's ID.</tspan>
      <tspan x="600" dy="82">Still in Production.</tspan>
    </text>

    <!-- Separator -->
    <rect x="530" y="740" width="140" height="5" rx="2.5" fill="#A52323"/>

    <!-- Supporting text -->
    <text x="600" y="810" text-anchor="middle" fill="#ffffff" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="28" opacity="0.55">
      <tspan x="600" dy="0">A multi-million-dollar approval process.</tspan>
      <tspan x="600" dy="40">Dependent on credentials that should have</tspan>
      <tspan x="600" dy="40">been decommissioned years ago.</tspan>
    </text>

    <!-- Bottom statement -->
    <g transform="translate(100, 970)">
      <rect width="1000" height="60" rx="10" fill="#A52323" opacity="0.15"/>
      <text x="500" y="40" text-anchor="middle" fill="#ffffff" font-family="Georgia, Palatino, serif" font-size="26" font-weight="600" opacity="0.9">
        Migration defects don't fix themselves. They become permanent.
      </text>
    </g>

    <!-- Brand lockup -->
    <g transform="translate(100, 1100)">
      <rect width="40" height="40" rx="11" fill="#f7f3ea" stroke="#c9b9a5" stroke-width="0.8"/>
      <path d="M9 14h7c3.4 0 6.2 2.8 6.2 6.2v0c0 3.4-2.8 6.2-6.2 6.2H9V14z" fill="#005e66"/>
      <path d="M31 26h-7c-3.4 0-6.2-2.8-6.2-6.2v0c0-3.4 2.8-6.2 6.2-6.2H31V26z" fill="#e84e1b"/>
      <circle cx="29.2" cy="20" r="2.1" fill="#f7f3ea"/>
      <text x="52" y="22" fill="#ffffff" font-family="Georgia, 'Iowan Old Style', Palatino, serif" font-size="22" letter-spacing="0.3">CloseLoop</text>
      <text x="53" y="36" fill="#655C53" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="2">MIGRATION INTEGRITY PLATFORM</text>
    </g>
  </g>
</svg>