<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="rounded"><rect width="1200" height="1200" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background: split design -->
    <rect width="580" height="1200" fill="#F1EEE8"/>
    <rect x="620" width="580" height="1200" fill="#005E66"/>

    <!-- Dividing line: bold orange -->
    <rect x="580" width="40" height="1200" fill="#E84E1B"/>

    <!-- LEFT SIDE: SAP — clean, organized -->
    <g transform="translate(60, 80)">
      <!-- SAP label -->
      <rect width="90" height="34" rx="6" fill="#005E66"/>
      <text x="14" y="23" fill="#ffffff" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" letter-spacing="2">SAP</text>

      <!-- Organized grid of data blocks -->
      <g transform="translate(0, 70)">
        <rect x="0" y="0" width="220" height="50" rx="8" fill="#005E66" opacity="0.12"/>
        <rect x="240" y="0" width="220" height="50" rx="8" fill="#005E66" opacity="0.12"/>
        <rect x="0" y="65" width="220" height="50" rx="8" fill="#005E66" opacity="0.12"/>
        <rect x="240" y="65" width="220" height="50" rx="8" fill="#005E66" opacity="0.12"/>
        <rect x="0" y="130" width="220" height="50" rx="8" fill="#005E66" opacity="0.12"/>
        <rect x="240" y="130" width="220" height="50" rx="8" fill="#005E66" opacity="0.12"/>
        <rect x="0" y="195" width="220" height="50" rx="8" fill="#005E66" opacity="0.12"/>
        <rect x="240" y="195" width="220" height="50" rx="8" fill="#005E66" opacity="0.12"/>

        <!-- Check marks on each block -->
        <text x="190" y="32" fill="#275928" font-size="22" font-family="sans-serif">&#10003;</text>
        <text x="430" y="32" fill="#275928" font-size="22" font-family="sans-serif">&#10003;</text>
        <text x="190" y="97" fill="#275928" font-size="22" font-family="sans-serif">&#10003;</text>
        <text x="430" y="97" fill="#275928" font-size="22" font-family="sans-serif">&#10003;</text>
        <text x="190" y="162" fill="#275928" font-size="22" font-family="sans-serif">&#10003;</text>
        <text x="430" y="162" fill="#275928" font-size="22" font-family="sans-serif">&#10003;</text>
        <text x="190" y="227" fill="#275928" font-size="22" font-family="sans-serif">&#10003;</text>
        <text x="430" y="227" fill="#275928" font-size="22" font-family="sans-serif">&#10003;</text>

        <!-- Data labels -->
        <text x="14" y="30" fill="#151311" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.5" opacity="0.7">Material Master</text>
        <text x="254" y="30" fill="#151311" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.5" opacity="0.7">Cost Centers</text>
        <text x="14" y="95" fill="#151311" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.5" opacity="0.7">Asset Register</text>
        <text x="254" y="95" fill="#151311" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.5" opacity="0.7">GL Accounts</text>
        <text x="14" y="160" fill="#151311" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.5" opacity="0.7">BOM Structure</text>
        <text x="254" y="160" fill="#151311" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.5" opacity="0.7">Vendor Master</text>
        <text x="14" y="225" fill="#151311" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.5" opacity="0.7">Routing Data</text>
        <text x="254" y="225" fill="#151311" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.5" opacity="0.7">Cost Elements</text>
      </g>

      <text x="0" y="360" fill="#151311" font-family="'Avenir Next', sans-serif" font-size="18" opacity="0.4" font-style="italic">SAP-to-SAP: covered</text>
    </g>

    <!-- RIGHT SIDE: Non-SAP — fragmented, chaotic -->
    <g transform="translate(660, 80)">
      <!-- Label -->
      <rect width="140" height="34" rx="6" fill="#E84E1B"/>
      <text x="10" y="23" fill="#ffffff" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" letter-spacing="2">NON-SAP</text>

      <!-- Scattered, rotated, misaligned blocks -->
      <g transform="translate(0, 70)">
        <!-- Oracle block: tilted -->
        <g transform="rotate(-3, 100, 30)">
          <rect x="0" y="0" width="200" height="48" rx="8" fill="#E84E1B" opacity="0.25" stroke="#E84E1B" stroke-width="1.5" stroke-dasharray="6,3"/>
          <text x="14" y="30" fill="#ffffff" font-family="'IBM Plex Mono', monospace" font-size="14" letter-spacing="0.5" opacity="0.9">Oracle ERP</text>
          <text x="160" y="30" fill="#A52323" font-size="18" font-family="sans-serif">?</text>
        </g>

        <!-- AS/400 block: tilted opposite -->
        <g transform="rotate(2, 200, 95)">
          <rect x="180" y="70" width="240" height="48" rx="8" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="6,3"/>
          <text x="194" y="100" fill="#ffffff" font-family="'IBM Plex Mono', monospace" font-size="14" letter-spacing="0.5" opacity="0.9">AS/400 Custom</text>
          <text x="380" y="100" fill="#A52323" font-size="18" font-family="sans-serif">?</text>
        </g>

        <!-- Excel block: tilted -->
        <g transform="rotate(-5, 80, 160)">
          <rect x="40" y="140" width="180" height="48" rx="8" fill="#ff885f" opacity="0.25" stroke="#ff885f" stroke-width="1.5" stroke-dasharray="6,3"/>
          <text x="54" y="170" fill="#ffffff" font-family="'IBM Plex Mono', monospace" font-size="14" letter-spacing="0.5" opacity="0.9">Excel Reports</text>
          <text x="180" y="170" fill="#A52323" font-size="18" font-family="sans-serif">?</text>
        </g>

        <!-- Dynamics block -->
        <g transform="rotate(4, 300, 230)">
          <rect x="120" y="210" width="300" height="48" rx="8" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="6,3"/>
          <text x="134" y="240" fill="#ffffff" font-family="'IBM Plex Mono', monospace" font-size="14" letter-spacing="0.5" opacity="0.9">MS Dynamics (partial)</text>
          <text x="380" y="240" fill="#A52323" font-size="18" font-family="sans-serif">?</text>
        </g>

        <!-- Disconnected arrows -->
        <line x1="100" y1="48" x2="60" y2="140" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
        <line x1="300" y1="118" x2="200" y2="210" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
      </g>

      <text x="0" y="360" fill="#ffffff" font-family="'Avenir Next', sans-serif" font-size="18" opacity="0.4" font-style="italic">Non-SAP to SAP: uncharted</text>
    </g>

    <!-- Main headline: overlay across center -->
    <g transform="translate(0, 540)">
      <rect x="60" y="0" width="1080" height="260" rx="16" fill="#151311" opacity="0.85"/>
      <text x="600" y="70" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Iowan Old Style', Palatino, serif" font-size="62" font-weight="700">
        <tspan x="600" dy="0">Your Migration Tools</tspan>
        <tspan x="600" dy="78">Stop at the SAP Border</tspan>
      </text>
      <!-- Accent underline -->
      <rect x="380" y="200" width="240" height="5" rx="2.5" fill="#E84E1B"/>
    </g>

    <!-- Supporting text -->
    <text x="600" y="880" text-anchor="middle" fill="#151311" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="26" opacity="0.6">
      <tspan x="600" dy="0">Cross-plant methodology validation</tspan>
      <tspan x="600" dy="36">for heterogeneous-source migrations.</tspan>
    </text>

    <!-- LEFT brand lockup (dark bg side is right, but lockup on left beige side for contrast) -->
    <g transform="translate(100, 1090)">
      <rect width="40" height="40" rx="11" fill="#f7f3ea" stroke="#c9b9a5" stroke-width="0.8"/>
      <path d="M9 14h7c3.4 0 6.2 2.8 6.2 6.2v0c0 3.4-2.8 6.2-6.2 6.2H9V14z" fill="#005e66"/>
      <path d="M31 26h-7c-3.4 0-6.2-2.8-6.2-6.2v0c0-3.4 2.8-6.2 6.2-6.2H31V26z" fill="#e84e1b"/>
      <circle cx="29.2" cy="20" r="2.1" fill="#f7f3ea"/>
      <text x="52" y="22" fill="#151311" font-family="Georgia, 'Iowan Old Style', Palatino, serif" font-size="22" letter-spacing="0.3">CloseLoop</text>
      <text x="53" y="36" fill="#655C53" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="2">MIGRATION INTEGRITY PLATFORM</text>
    </g>
  </g>
</svg>